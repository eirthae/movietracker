<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Neon reel-to-reel recorder on dark blue — app icon -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
    <g id="pg" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="32" cy="28" r="15.5"/>
      <circle cx="68" cy="28" r="15.5"/>
      <circle cx="32" cy="28" r="3.5"/>
      <circle cx="68" cy="28" r="3.5"/>
      <path d="M32 23.5 V14"/>
      <path d="M35.9 30.2 L44 35"/>
      <path d="M28.1 30.2 L20 35"/>
      <path d="M68 23.5 V14"/>
      <path d="M71.9 30.2 L80 35"/>
      <path d="M64.1 30.2 L56 35"/>
      <rect x="18.5" y="46" width="63" height="42" rx="2.5"/>
      <circle cx="57" cy="78" r="4"/>
    </g>
    <g id="yg" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M29 52 H71 L53 67.5 H47 Z"/>
      <path d="M44 55 V60"/>
      <path d="M56 55 V60"/>
      <rect x="24" y="74" width="22" height="8" rx="1.5"/>
      <circle cx="69" cy="78" r="4"/>
    </g>
    <g id="yd">
      <circle cx="29.5" cy="78" r="1.4"/>
      <circle cx="35" cy="78" r="1.4"/>
      <circle cx="40.5" cy="78" r="1.4"/>
    </g>
  </defs>

  <rect width="100" height="100" fill="#20244A"/>

  <!-- glow underlayers -->
  <use href="#pg" stroke="#8F6FE8" stroke-width="4.5" opacity="0.8" filter="url(#glow)"/>
  <use href="#yg" stroke="#FFC61A" stroke-width="4.5" opacity="0.85" filter="url(#glow)"/>
  <use href="#yd" fill="#FFC61A" opacity="0.85" filter="url(#glow)"/>

  <!-- crisp neon tubes -->
  <use href="#pg" stroke="#CBB9FF" stroke-width="2.2"/>
  <use href="#yg" stroke="#FFE066" stroke-width="2.2"/>
  <use href="#yd" fill="#FFF0A0"/>
</svg>
